name: Build and Release (Mac)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --publish never
      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
          draft: false
          prerelease: false
